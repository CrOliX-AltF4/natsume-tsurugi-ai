<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Lost in the Abyss</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Crimson+Pro:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  .page-404 {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    position: relative;
    overflow: hidden;
  }

  .error-num {
    font-family: var(--font-display);
    font-size: clamp(100px, 22vw, 180px);
    color: transparent;
    background: linear-gradient(135deg, rgba(139,26,26,0.2), rgba(154,123,63,0.35));
    -webkit-background-clip: text;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
    animation: fadeUp 0.8s ease both;
  }

  .error-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.5;
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease 0.15s both;
  }

  .error-title {
    font-family: var(--font-display);
    font-size: clamp(22px, 4vw, 36px);
    color: var(--ivory);
    margin-bottom: 16px;
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .error-body {
    font-style: italic;
    font-size: 17px;
    color: var(--ivory-faint);
    line-height: 1.8;
    max-width: 460px;
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease 0.45s both;
  }

  .error-quote {
    padding: 20px 28px;
    border-left: 2px solid var(--crimson);
    background: rgba(139,26,26,0.04);
    margin-bottom: 48px;
    max-width: 400px;
    text-align: left;
    animation: fadeUp 0.8s ease 0.6s both;
  }

  .error-quote p {
    font-style: italic;
    color: var(--ivory-faint);
    font-size: 16px;
    line-height: 1.7;
  }

  .error-quote cite {
    display: block;
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 8px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    font-style: normal;
    opacity: 0.5;
  }

  .btn-return {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 14px 40px;
    background: var(--crimson);
    color: var(--ivory);
    border: 1px solid #C0392B;
    transition: box-shadow 0.3s, transform 0.2s;
    animation: fadeUp 0.8s ease 0.75s both;
  }

  .btn-return:hover {
    box-shadow: 0 0 40px rgba(139,26,26,0.4);
    transform: translateY(-1px);
  }

  .rings {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(139,26,26,0.08);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: ringExpand 6s ease-in-out infinite;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes ringExpand {
    0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 0.8; transform: translate(-50%, -50%) scale(1.03); }
  }
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="page-404">
    <div class="rings">
      <div class="ring" style="width:300px;height:300px;"></div>
      <div class="ring" style="width:500px;height:500px;animation-delay:2s;border-color:rgba(154,123,63,0.05);"></div>
      <div class="ring" style="width:700px;height:700px;animation-delay:4s;border-color:rgba(139,26,26,0.04);"></div>
    </div>

    <div class="error-num">404</div>
    <div class="error-sub">∙ &nbsp; Lost in the Abyss &nbsp; ∙</div>

    <div class="error-title">The Path Does Not Exist</div>
    <p class="error-body">
      You have wandered beyond the edge of the map.<br>
      Not even Natsume's memory holds this place.
    </p>

    <div class="error-quote">
      <p>I searched every memory. Every fragment. This path leads nowhere, Master.</p>
      <cite>— Natsume Tsurugi</cite>
    </div>

    <a href="/" class="btn-return">Return to Sanctuary</a>
  </div>
</body>
</html>

<link rel="preload" href="sections/hero.html" as="fetch" crossorigin>

<!-- Styles -->
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<!-- ══════════ SVG FILTERS ══════════ -->
<svg aria-hidden="true" focusable="false" width="0" height="0" style="position:absolute">
  <defs>
    <filter id="flame-filter" x="-40%" y="-40%" width="180%" height="220%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="turbulence" baseFrequency="0.035 0.07"
        numOctaves="4" seed="5" result="noise">
        <animate attributeName="baseFrequency"
          values="0.035 0.07; 0.055 0.10; 0.030 0.08; 0.045 0.07; 0.035 0.07"
          dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="seed"
          values="5;6;5" dur="4s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise"
        scale="7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- ══════════ LOADER ══════════ -->
<div id="loader">
  <div class="candles-container">
    <div class="candle" style="--i:1"><div class="flame"></div><div class="wax"></div><div class="wick"></div></div>
    <div class="candle" style="--i:2"><div class="flame"></div><div class="wax"></div><div class="wick"></div></div>
    <div class="candle" style="--i:3"><div class="flame"></div><div class="wax"></div><div class="wick"></div></div>
  </div>
  <div class="loader-text">Awakening Memory</div>
</div>

<!-- ══════════ FIXED ELEMENTS ══════════ -->
<div class="grain"></div>
<div class="vignette"></div>
<div class="tapestry"></div>
<canvas id="particles"></canvas>
<div id="curtain">
  <div class="curtain-sigil" id="curtain-sigil">
    <div class="curtain-sigil-ring"></div>
    <span class="curtain-sigil-glyph">✦</span>
  </div>
</div>
<div id="progress-bar"></div>

<!-- ══════════ CURSOR — Quill Pen ══════════ -->
<div id="cursor" class="state-default">
  <!-- Loaded via JS to keep index clean -->
</div>

<!-- ══════════ NAV ══════════ -->
<nav id="nav">
  <a class="nav-logo" href="#" data-scene="hero">Natsume <em>Tsurugi</em></a>

  <ul class="nav-links">
    <li><a class="nav-link" data-scene="lore"      href="#lore">Lore</a></li>
    <li><a class="nav-link" data-scene="profiles"  href="#profiles">Profiles</a></li>
    <li><a class="nav-link" data-scene="abilities" href="#abilities">Abilities</a></li>
    <li><a class="nav-link" data-scene="gallery"   href="#gallery">Gallery</a></li>
    <li><a class="nav-link" data-scene="system"    href="#system">System</a></li>
    <li><a class="nav-link" data-scene="chronicle" href="#chronicle">Chronicle</a></li>
    <li><a class="nav-link" data-scene="contact"   href="#contact">Contact</a></li>
  </ul>

  <div style="display:flex;align-items:center;gap:16px;">
    <span class="nav-badge">v0.5.0</span>
    <button class="nav-burger" id="nav-burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- Mobile nav -->
<div class="nav-mobile" id="mobile-menu">
  <a data-scene="lore"      href="#lore">Lore</a>
  <a data-scene="profiles"  href="#profiles">Profiles</a>
  <a data-scene="abilities" href="#abilities">Abilities</a>

<!-- ════════════════════════════════════════
     MAIN CONTENT CONTAINER
     ════════════════════════════════════════ -->
<main id="app">
  <!-- Scenes will be injected here dynamically -->
</main>

<!-- ══════════ TERMINAL ══════════ -->
<div id="terminal-overlay" aria-hidden="true">
  <div id="terminal-window">
    <div id="terminal-header">
      <span class="terminal-title">natsume@w-AI-fu:~$</span>
      <button id="terminal-close" aria-label="Close terminal">✕</button>
    </div>
    <div id="terminal-output"></div>
    <div id="terminal-input-row">
      <span class="terminal-prompt">$&nbsp;</span>
      <input id="terminal-input" type="text" autocomplete="off" spellcheck="false" placeholder="type a command…">
    </div>
  </div>
</div>
<button id="terminal-btn" title="Terminal  (`)">&#62;_</button>

<!-- ══════════ LIGHTBOX ══════════ -->
<div id="lightbox" aria-hidden="true">
  <div id="lightbox-backdrop"></div>
  <button id="lightbox-close" aria-label="Close">✕</button>
  <button class="lightbox-nav" id="lightbox-prev" aria-label="Previous">&#8592;</button>
  <button class="lightbox-nav" id="lightbox-next" aria-label="Next">&#8594;</button>
  <figure id="lightbox-figure">
    <img id="lightbox-img" src="" alt="">
    <figcaption id="lightbox-caption"></figcaption>
  </figure>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
